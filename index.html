<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Strange Worlds</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0e0d16;
        overflow: hidden;
      }
      #game {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game canvas {
        touch-action: none;
      }
      /* NOTE: the girl's inner voice lives in the DOM, not the canvas — crisper
         text at any scale and trivially localizable later. */
      #dialogue {
        position: fixed;
        left: 50%;
        bottom: 9%;
        transform: translateX(-50%);
        max-width: 80vw;
        padding: 10px 18px;
        font: italic 17px Georgia, 'Times New Roman', serif;
        color: #e8e3f5;
        background: rgba(14, 13, 22, 0.72);
        border: 1px solid rgba(157, 240, 232, 0.25);
        border-radius: 12px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.45s ease;
        pointer-events: none;
      }
      #dialogue.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="dialogue" role="status"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
